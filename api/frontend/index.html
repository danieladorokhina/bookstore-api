<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bookstore Frontend</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; background: #fafafa; }
    h1 { color: #333; }
    button { background: #4CAF50; color: white; padding: 8px 12px; border: none; cursor: pointer; }
    button:hover { background: #45a049; }
    #books { margin-top: 20px; }
    .author { border-bottom: 1px solid #ccc; padding: 10px 0; }
  </style>
</head>
<body>
  <h1>📚 Bookstore — Book List</h1>
  <button id="loadAuthors">Get Books</button>
  <div id="books"></div>

  <script>
    $("#loadAuthors").click(function() {
      $.get("http://127.0.0.1:8000/books/", function(data) {
        $("#books").empty();
        data.forEach(book => {
          $("#books").append(`
            <div class="author">
              <h3>${book.title}</h3>
              <p>Author: ${book.author}</p>
              <p>Price: ${book.price} UAH</p>
            </div>
          `);
        });
      }).fail(() => alert("Error: could not connect to API"));
    });
  </script>
</body>
</html>
